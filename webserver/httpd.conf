# /etc/httpd.conf — dpcpbp.org web server
# OpenBSD httpd, static file serving

# HTTP: redirect all traffic to HTTPS
server "dpcpbp.org" {
	listen on * port 80
	alias "www.dpcpbp.org"

	# Allow acme-client HTTP-01 challenge
	location "/.well-known/acme-challenge/*" {
		root "/acme"
		request strip 2
	}

	location "*" {
		block return 301 "https://$HTTP_HOST$REQUEST_URI"
	}
}

# HTTPS: main server
server "dpcpbp.org" {
	listen on * tls port 443
	alias "www.dpcpbp.org"

	tls {
		certificate "/etc/ssl/dpcpbp.org.fullchain.pem"
		key         "/etc/ssl/private/dpcpbp.org.key"
	}

	root "/htdocs/dpcpbp.org"
	directory index "index.html"

	# Large file support (PDFs, etc.) — 200MB limit
	connection max request body 209715200

	# Cache headers for static assets
	location "*.css" { request rewrite "$REQUEST_URI" }
	location "*.js"  { request rewrite "$REQUEST_URI" }
	location "*.pdf" { request rewrite "$REQUEST_URI" }

	location "*" {
		pass
	}
}
